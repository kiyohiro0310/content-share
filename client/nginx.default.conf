server {
    listen 80;
    server_name sound-link.nk-1310.online;
    
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sound-link.nk-1310.online;

    ssl_certificate /etc/letsencrypt/live/sound-link.nk-1310.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sound-link.nk-1310.online/privkey.pem;

    # Big Tech Best Practices (Security Headers)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}