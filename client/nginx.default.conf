server {
    listen 80;
    server_name content-share.nk-1310.online;

    # Needed for Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # TEMPORARY: Allow access via HTTP so we can verify the domain
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # COMMENT OUT OR REMOVE THE ENTIRE 443 SERVER BLOCK FOR NOW
}