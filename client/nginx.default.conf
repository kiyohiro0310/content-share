server {
    listen 80;
    server_name content-share.nk-1310.online;

    # Needed for Certbot verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name content-share.nk-1310.online;

    # These paths are created after running the certbot command in Step 3
    ssl_certificate /etc/letsencrypt/live/content-share.nk-1310.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/content-share.nk-1310.online/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://content-share-nestjs-api:3000; # Matches container_name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}