# This nginx file is ALB compatibility
server {
    listen 80 default_server;
    # server_name _ matches any hostname (including the ALB DNS)
    server_name _; 

    root /usr/share/nginx/html;
    index index.html;

    # Explicitly include MIME types
    include /etc/nginx/mime.types;

    location / {
        # This allows React/Vite routing but can hide 404s for assets
        try_files $uri $uri/ /index.html;
    }

    # FIX: Add a specific block for assets to prevent the HTML fallback
    location /assets/ {
        # If a file in /assets is not found, return a REAL 404 instead of index.html
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # IMPORTANT: ALB handles HTTPS, so we tell the backend about it
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}