
services:
  db:
    image: postgres
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: Kiyo
      POSTGRES_PASSWORD: a1b2c3d4e5A
      POSTGRES_DB: content-share
    
    volumes:
      - ./db/db_backup.sql:/docker-entrypoint-initdb.d/db_backup.sql
      - postgres_data:/var/lib/postgresql
  
  server:
    build:
      context: ./server
      dockerfile: ./Dockerfile
    container_name: content-share-nestjs-api
    restart: always
    environment:
      DATABASE_URL: postgresql://Kiyo:a1b2c3d4e5A@db:5442/content-share
    depends_on:
      - db
  
  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    container_name: content-share-client
    restart: always
    depends_on:
      - server
    ports:
      - 80:80
      - 443:443
    volumes:
      # Map your local Nginx config so you can update it without rebuilding the image
      - ./nginx.default.conf:/etc/nginx/conf.d/default.conf
      # Shared volumes for SSL certificates
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/html

  certbot:
      image: certbot/certbot
      container_name: certbot
      volumes:
        - certbot-etc:/etc/letsencrypt
        - certbot-var:/var/lib/letsencrypt
        - webroot:/var/www/html
      # Automated renewal check
      entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot-etc:
  certbot-var:
  webroot: